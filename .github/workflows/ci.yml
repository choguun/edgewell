name: EdgeWell CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22.17", "24"]
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.6.0
      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Type check
        run: pnpm typecheck
      - name: Run tests
        run: pnpm test
      - name: Smoke CLI
        run: |
          node dist/bin/edgewell.js version
          node dist/bin/edgewell.js help | head -5
          node dist/bin/edgewell.js status
          node dist/bin/edgewell.js doctor
          node dist/bin/edgewell.js models list
          node dist/bin/edgewell.js config > /dev/null
          node dist/bin/edgewell.js redact text "my email is ada@example.com" | grep REDACTED
