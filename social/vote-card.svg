<?xml version="1.0" encoding="UTF-8"?>
<!-- EdgeWell v3.0.1 — Community Vote Card -->
<!-- Self-contained SVG. No external fonts, no external assets. -->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 400"
     width="800" height="400"
     role="img"
     aria-label="EdgeWell v3.0.1 — Private on-device AI coach. Vote card.">
  <title>EdgeWell v3.0.1 — Vote Card</title>
  <desc>Self-contained shareable vote card for the EdgeWell v3.0.1
  QVAC hackathon submission. Includes the project name, a one-line
  pitch, a sample terminal block of `edgewell showcase` output, and
  the 5-minute reproduction command.</desc>

  <!-- ============================================================ -->
  <!-- Definitions: gradient, play triangle, terminal block style   -->
  <!-- ============================================================ -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111418"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#10b981" stop-opacity="0.0"/>
      <stop offset="50%"  stop-color="#10b981" stop-opacity="1.0"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.0"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background panel -->
  <rect x="0" y="0" width="800" height="400" fill="url(#bgGrad)"/>

  <!-- Top accent rule -->
  <rect x="40" y="36" width="720" height="2" fill="url(#accentLine)"/>

  <!-- Tag pill: HACKATHON -->
  <g transform="translate(40, 56)">
    <rect x="0" y="0" width="120" height="22" rx="11" ry="11"
          fill="none" stroke="#10b981" stroke-width="1.2"/>
    <text x="60" y="15" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
          font-size="11" font-weight="700"
          letter-spacing="2" fill="#10b981">QVAC 2026</text>
  </g>

  <!-- Project title -->
  <text x="40" y="128"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="56" font-weight="800"
        fill="#e7ecf2">EdgeWell v3.0.1</text>

  <!-- Subtitle -->
  <text x="40" y="160"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="15" font-weight="500"
        fill="#8a93a4">Private on-device AI · QVAC SDK · 7 agents · 1 codebase, 3 form factors</text>

  <!-- ============================================================ -->
  <!-- Play triangle pointing at the terminal block                 -->
  <!-- ============================================================ -->
  <g transform="translate(48, 232)" filter="url(#softGlow)">
    <polygon points="0,0 24,16 0,32" fill="#10b981"/>
  </g>
  <text x="36" y="290"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="10" font-weight="700"
        letter-spacing="2" fill="#8a93a4">RUN</text>

  <!-- ============================================================ -->
  <!-- Terminal block                                              -->
  <!-- ============================================================ -->
  <g transform="translate(96, 200)">
    <!-- Window chrome -->
    <rect x="0" y="0" width="640" height="140" rx="10" ry="10"
          fill="#0f1115" stroke="#232733" stroke-width="1"/>
    <!-- Title bar dots -->
    <circle cx="18"  cy="18" r="5" fill="#fca5a5"/>
    <circle cx="36"  cy="18" r="5" fill="#fbbf24"/>
    <circle cx="54"  cy="18" r="5" fill="#86efac"/>
    <text x="80" y="22"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="11" fill="#8a93a4">edgewell ~ showcase</text>

    <!-- Body -->
    <text x="18" y="56"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#86efac">$ node bin/edgewell.js showcase</text>
    <text x="18" y="78"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#e7ecf2">[health]  "Why am I tired?"     → 3 tips grounded in journal</text>
    <text x="18" y="98"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#e7ecf2">[finance] "Save 20% of income?" → 50/30/20 budget plan</text>
    <text x="18" y="118"
          font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#e7ecf2">[activity] "Daily step target?"  → 7k–10k, ramp from baseline</text>
  </g>

  <!-- ============================================================ -->
  <!-- Footer: reproduction command                                -->
  <!-- ============================================================ -->
  <rect x="40" y="358" width="720" height="1" fill="#232733"/>
  <text x="40" y="380"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="12" fill="#8a93a4">Reproduce in 5 min:</text>
  <text x="160" y="380"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="12" font-weight="700"
        fill="#10b981">pnpm install &amp;&amp; pnpm build &amp;&amp; node dist/bin/edgewell.js showcase</text>
</svg>
